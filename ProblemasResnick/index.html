<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Problemario de Física</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Mi Problemario de Física</h1>
      <input
        type="text"
        id="searchInput"
        placeholder="Buscar por tema, ID o palabra clave..."
      />
    </header>

    <div class="app-layout">
      <aside class="sidebar-left" id="chapter-list">></aside>

      <main class="content-center">
        <div id="problem-view" class="empty-state">
          <h2>Selecciona un problema de la izquierda</h2>
          <p>
            O utiliza el buscador de arriba para encontrar lo que necesitas.
          </p>
        </div>
      </main>

      <aside class="sidebar-right">
        <h3>Fórmulas y Datos Extraídos</h3>
        <div id="formulas-view">
          <p class="empty-text">
            Las fórmulas usadas en el problema aparecerán aquí.
          </p>
        </div>
      </aside>
    </div>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
